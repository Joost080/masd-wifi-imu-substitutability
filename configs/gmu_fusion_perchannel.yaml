experiment: rq5_gmu_perchannel

data:
  modality: gmu_fusion
  batch_size: 32
  val_split: 0.2
  num_workers: 4
  seed: 42

model:
  num_classes: 27
  conv_channels: 64
  conv_kernel: 5
  lstm_hidden: 128
  conv_dropout: 0.1
  lstm_dropout: 0.0
  head_dropout: 0.5
  gate_dim: 64   # per-channel gate (original GMU formulation, Arevalo 2017)

training:
  optimizer: adam
  lr: 0.001
  momentum: 0.9
  epochs: 80
  early_stop_patience: 10
