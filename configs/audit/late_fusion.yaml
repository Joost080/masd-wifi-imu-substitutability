experiment: audit_dropout_late_fusion

# Proposal RQ3 concat fusion (late), corrected pipeline, uniform audit dropout
# 0.5/0.5/0.5. Corrected fusion path (WiFi->150).

data:
  modality: late_fusion
  batch_size: 32
  val_split: 0.2
  num_workers: 4
  seed: 42

model:
  num_classes: 27
  conv_channels: 64
  conv_kernel: 5
  lstm_hidden: 128
  conv_dropout: 0.5
  lstm_dropout: 0.5
  head_dropout: 0.5

training:
  optimizer: adam
  lr: 0.001
  momentum: 0.9
  epochs: 80
  early_stop_patience: 10
