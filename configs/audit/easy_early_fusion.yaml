experiment: audit_dropout_easy_early_fusion

# Proposal RQ3 concat fusion (early), Easy 5-class, corrected pipeline, audit dropout.

data:
  modality: early_fusion
  batch_size: 32
  val_split: 0.2
  num_workers: 4
  seed: 42
  class_filter: [0, 1, 2, 3, 4]

model:
  num_classes: 5
  conv_channels: 64
  conv_kernel: 5
  lstm_hidden: 128
  conv_dropout: 0.5
  lstm_dropout: 0.5
  head_dropout: 0.5

training:
  optimizer: adam
  lr: 0.001
  momentum: 0.9
  epochs: 80
  early_stop_patience: 10
