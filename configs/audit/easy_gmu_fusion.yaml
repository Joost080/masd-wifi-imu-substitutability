experiment: audit_dropout_easy_gmu

# Sanity-check rerun of Easy 5-class scalar GMU with Ordoñez & Roggen 2016
# dropout (0.5 / 0.5 / 0.5) instead of the 0.1 / 0.0 / 0.5 used in
# rq5_easy_gmu_fusion. Used to test whether the gate≈0 finding on Easy
# (which we interpreted as "co-training regularisation, not real fusion")
# is a genuine optimisation outcome or a sigmoid-saturation artefact caused
# by training without LSTM dropout.

data:
  modality: gmu_fusion
  batch_size: 32
  val_split: 0.2
  num_workers: 4
  seed: 42
  class_filter: [0, 1, 2, 3, 4]

model:
  num_classes: 5
  conv_channels: 64
  conv_kernel: 5
  lstm_hidden: 128
  conv_dropout: 0.5   # was 0.1
  lstm_dropout: 0.5   # was 0.0 — Ordoñez 2016 uses 0.5
  head_dropout: 0.5
  gate_dim: 1   # scalar gate (matches rq5_easy_gmu_fusion for direct comparison)

training:
  optimizer: adam
  lr: 0.001
  momentum: 0.9
  epochs: 80
  early_stop_patience: 10
