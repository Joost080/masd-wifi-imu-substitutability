experiment: ablation_imu6_resnet_easy

# Matrix fill: ResNet-1D on IMU, 6-axis, Easy 5-class (symmetry with the Hard run).
# IMU-Easy is near ceiling; expect ResNet >= DeepConvLSTM-Easy (0.944-0.952).

data:
  modality: imu6_resnet
  batch_size: 32
  val_split: 0.2
  num_workers: 4
  seed: 42
  class_filter: [0, 1, 2, 3, 4]

model:
  type: resnet1d
  in_channels: 6
  num_classes: 5
  stem_channels: 64
  head_dropout: 0.5

training:
  optimizer: adam
  lr: 0.001
  momentum: 0.9
  epochs: 80
  early_stop_patience: 10
