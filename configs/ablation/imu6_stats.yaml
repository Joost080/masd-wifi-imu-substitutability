experiment: ablation_imu6_stats

# §C magnetometer ablation, stats-MLP on 6-axis acc+gyro features (36 = 6 features
# x 6 axes; mag axes dropped). Audit dropout. Pairs with the 9-axis stats_imu_only
# (54 features, 0.754). Tests whether the strong stats baseline also survives mag removal.

data:
  modality: imu6_stats
  batch_size: 32
  val_split: 0.2
  num_workers: 4
  seed: 42

model:
  type: stats_mlp
  in_features: 36
  num_classes: 27
  hidden: 128
  dropout: 0.5

training:
  optimizer: adam
  lr: 0.001
  momentum: 0.9
  epochs: 80
  early_stop_patience: 10
