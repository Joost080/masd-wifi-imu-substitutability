experiment: stats_imu_wifi

# 27-class stats-stats fusion. Activate only if the Easy variant
# (`configs/easy/stats_imu_wifi.yaml`) shows the fusion adds meaningful
# signal over IMU stats alone. Compares against `stats_imu_only` (existing
# 27-class IMU stats multi-seed at 0.7500 / 0.7363).
#
# Side-experiment: NOT in proposal. Logged in experiment_log.md.

data:
  modality: imu_wifi_stats
  batch_size: 32
  val_split: 0.2
  num_workers: 4
  seed: 42

model:
  type: stats_stats_mlp
  imu_features: 54
  wifi_features: 33
  num_classes: 27
  hidden: 128
  dropout: 0.5

training:
  optimizer: adam
  lr: 0.001
  momentum: 0.9
  epochs: 80
  early_stop_patience: 10
