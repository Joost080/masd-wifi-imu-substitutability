experiment: stats_imu_raw_stats

# Variant C of the stats-features side-experiment.
# Late fusion of raw DeepConvLSTM trunk and a stats encoder. Backbone hyper-
# parameters identical to audit_dropout_imu so the comparison isolates the
# effect of adding the stats branch.
# Side-experiment: NOT in proposal. Logged in experiment_log.md.

data:
  modality: imu_raw_stats
  batch_size: 32
  val_split: 0.2
  num_workers: 4
  seed: 42

model:
  type: deepconvlstm_stats
  in_channels: 9
  num_classes: 27
  conv_channels: 64
  conv_kernel: 5
  lstm_hidden: 128
  conv_dropout: 0.5
  lstm_dropout: 0.5
  head_dropout: 0.5
  stats_in_features: 54
  stats_hidden: 64

training:
  optimizer: adam
  lr: 0.001
  momentum: 0.9
  epochs: 80
  early_stop_patience: 10
