experiment: rq2_imu_corrected

data:
  modality: imu
  batch_size: 32
  val_split: 0.2
  num_workers: 4
  seed: 42

model:
  in_channels: 9
  num_classes: 27
  conv_channels: 64
  conv_kernel: 5
  lstm_hidden: 128
  conv_dropout: 0.1
  lstm_dropout: 0.5
  head_dropout: 0.5

training:
  optimizer: adam
  lr: 0.001
  momentum: 0.9
  epochs: 80
  early_stop_patience: 10
