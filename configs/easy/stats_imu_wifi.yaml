experiment: stats_imu_wifi_easy

# Stats-stats fusion on the Easy 5-class subset.
# Concat IMU stats (54-D) + WiFi CSI stats (33-D) -> small MLP. Tests whether
# weak CSI summary information is *complementary* to strong IMU summary
# information in the simplest possible fusion setting (no learned gating,
# no attention, no per-modality encoders -- just concat).
#
# Compares against:
#   - stats_imu_only_easy   (IMU stats alone, same backbone)   -- fusion gain?
#   - stats_wifi_only_easy  (CSI stats alone, already trained) -- complement?
#   - audit_dropout_easy_imu   (raw IMU,  multi-seed pending)
#   - audit_dropout_easy_gmu   (raw GMU,  multi-seed pending)  -- match-or-beat
#
# Side-experiment: NOT in proposal. Logged in experiment_log.md.

data:
  modality: imu_wifi_stats
  batch_size: 32
  val_split: 0.2
  num_workers: 4
  seed: 42
  class_filter: [0, 1, 2, 3, 4]

model:
  type: stats_stats_mlp
  imu_features: 54
  wifi_features: 33
  num_classes: 5
  hidden: 128
  dropout: 0.5

training:
  optimizer: adam
  lr: 0.001
  momentum: 0.9
  epochs: 80
  early_stop_patience: 10
